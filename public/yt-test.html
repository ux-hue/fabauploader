<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>YouTube Client Test</title>
<style>
body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #e0e0e0; }
h2 { color: #fff; }
.result { padding: 10px; margin: 8px 0; border-radius: 6px; font-size: 13px; }
.ok { background: #1a3a1a; border-left: 4px solid #4caf50; }
.err { background: #3a1a1a; border-left: 4px solid #f44336; }
.pending { background: #2a2a2a; border-left: 4px solid #888; }
button { background: #FF5A35; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; font-size: 15px; cursor: pointer; margin-bottom: 20px; }
input { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 14px; width: 400px; margin-right: 10px; }
pre { white-space: pre-wrap; word-break: break-all; font-size: 11px; margin-top: 6px; opacity: 0.8; color: #aaffaa; }
</style>
</head>
<body>
<h2>🔬 YouTube Client Test</h2>
<p style="color:#aaa">Testa tutti i client InnerTube tramite il server proxy.</p>

<input type="text" id="vid" value="kRXmAIHYQR4" placeholder="Video ID"/>
<button onclick="runAll()">▶️ Testa tutti i client</button>

<div id="results"></div>

<script>
const CLIENTS = [
  { name: 'WEB', clientName: 'WEB', clientVersion: '2.20250312.04.00', headers: {} },
  { name: 'ANDROID_VR', clientName: 'ANDROID_VR', clientVersion: '1.56.21',
    extra: { deviceMake: 'Oculus', deviceModel: 'Quest 3', androidSdkVersion: 32, osName: 'Android', osVersion: '12L' },
    headers: { 'User-Agent': 'com.google.android.apps.youtube.vr.oculus/1.56.21 (Linux; U; Android 12L; eureka-user Build/SQ3A.220605.009.A1) gzip', 'X-YouTube-Client-Name': '28', 'X-YouTube-Client-Version': '1.56.21' }
  },
  { name: 'TV_DOWNGRADED (v4)', clientName: 'TVHTML5', clientVersion: '4',
    headers: { 'User-Agent': 'Mozilla/5.0 (ChromiumStylePlatform) Cobalt/Version', 'X-YouTube-Client-Name': '7', 'X-YouTube-Client-Version': '4' }
  },
  { name: 'IOS', clientName: 'IOS', clientVersion: '19.49.7',
    extra: { deviceMake: 'Apple', deviceModel: 'iPhone16,2', osName: 'iPhone', osVersion: '17.5.1.21F90' },
    headers: { 'User-Agent': 'com.google.ios.youtube/19.49.7 (iPhone16,2; U; CPU iOS 17_5_1 like Mac OS X;)', 'X-YouTube-Client-Name': '5', 'X-YouTube-Client-Version': '19.49.7' }
  },
  { name: 'MWEB', clientName: 'MWEB', clientVersion: '2.20250312.04.00',
    headers: { 'User-Agent': 'Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 Mobile/15E148 Safari/604.1', 'X-YouTube-Client-Name': '2', 'X-YouTube-Client-Version': '2.20250312.04.00' }
  },
  { name: 'TV (latest)', clientName: 'TVHTML5', clientVersion: '7.20260114.12.00',
    headers: { 'User-Agent': 'Mozilla/5.0 (ChromiumStylePlatform) Cobalt/25.lts.30.1034943-gold (unlike Gecko), Unknown_TV_Unknown_0/Unknown (Unknown, Unknown)', 'X-YouTube-Client-Name': '7', 'X-YouTube-Client-Version': '7.20260114.12.00' }
  }
];

async function runAll() {
  const videoId = document.getElementById('vid').value.trim();
  const results = document.getElementById('results');
  results.innerHTML = '';

  for (const client of CLIENTS) {
    const div = document.createElement('div');
    div.className = 'result pending';
    div.innerHTML = `<strong>${client.name}</strong> — testing...`;
    results.appendChild(div);

    try {
      const r = await fetch('/api/yt-test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ videoId, client })
      });
      const d = await r.json();
      const isOk = d.status === 'OK' && d.audioWithUrl > 0;
      div.className = 'result ' + (isOk ? 'ok' : 'err');
      div.innerHTML = `<strong>${client.name}</strong> — status: <b>${d.status || 'N/A'}</b> | audio con URL diretto: <b>${d.audioWithUrl}</b> | con cipher: ${d.audioWithCipher}${d.firstUrl ? `<pre>✅ URL: ${d.firstUrl}...</pre>` : ''}${d.error ? `<pre>❌ ${d.error}</pre>` : ''}`;
    } catch(e) {
      div.className = 'result err';
      div.innerHTML = `<strong>${client.name}</strong> — ERRORE: ${e.message}`;
    }
  }
}
</script>
</body>
</html>
